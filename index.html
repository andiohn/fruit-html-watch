<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Watch Configurator</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007aff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon192.png">
    <style>
        :root { --primary: #007aff; --bg: #000000; --card: #1c1c1e; --text: #ffffff; --secondary-text: #8e8e93; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 900px; width: 100%; }
        
        h1 { font-weight: 600; letter-spacing: -0.5px; margin-bottom: 30px; }
        
        /* Presets Section */
        .presets-header { color: var(--secondary-text); text-transform: uppercase; font-size: 0.75rem; font-weight: 700; letter-spacing: 1px; margin-bottom: 15px; }
        .preset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; margin-bottom: 40px; }
        .preset-item { background: var(--card); border-radius: 12px; padding: 15px; cursor: pointer; transition: all 0.2s ease; border: 2px solid transparent; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .preset-item:hover { transform: translateY(-3px); background: #2c2c2e; }
        .preset-item.active { border-color: var(--primary); background: #2c2c2e; }
        
        .preset-icon { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; margin-bottom: 12px; font-size: 1.2rem; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .preset-desc { font-size: 0.8rem; color: var(--secondary-text); line-height: 1.3; }

        /* Form Sections */
        .section { background: var(--card); border-radius: 12px; padding: 25px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .section h2 { grid-column: 1 / -1; margin: 0 0 10px 0; font-size: 1.1rem; color: #fff; border-left: 4px solid var(--primary); padding-left: 10px; }
        .input-group { display: flex; flex-direction: column; }
        .full-width { grid-column: 1 / -1; }
        
        label { font-size: 0.75rem; color: var(--secondary-text); margin-bottom: 6px; font-weight: 600; }
        input, select { background: #2c2c2e; border: none; color: white; padding: 12px; border-radius: 8px; font-size: 0.9rem; outline: none; }
        input:focus { background: #3a3a3c; }

        /* Checkbox Styling */
        .checkbox-group { flex-direction: row; align-items: center; gap: 10px; cursor: pointer; }
        .checkbox-group input { width: 18px; height: 18px; cursor: pointer; }

        .btn-container { position: sticky; bottom: 20px; padding: 10px 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); width: 100%; display: flex; justify-content: center; z-index: 100; }
        button#go { width: 100%; max-width: 400px; padding: 18px; background: var(--primary); border: none; border-radius: 14px; color: white; font-size: 1.1rem; font-weight: 700; cursor: pointer; box-shadow: 0 10px 20px rgba(0,122,255,0.3); transition: all 0.2s; }
        button#go:hover { transform: scale(1.02); background: #0071eb; }
    </style>
</head>
<body>

<div class="container">
    <h1>Watch Configurator</h1>

    <div class="presets-header">Quick Presets</div>
    <div class="preset-grid" id="presetGrid"></div>

    <div class="section">
        <h2>Wallpapers</h2>
        <div class="input-group full-width">
            <label>Primary Image URL (bg_img)</label>
            <input type="text" id="bg_img" placeholder="https://...">
        </div>
        <div class="input-group">
            <label>Primary Mode</label>
            <select id="bg_mode">
                <option value="cover">Cover</option>
                <option value="center">Center</option>
                <option value="tile">Tile</option>
            </select>
        </div>
        <div class="input-group full-width">
            <label>Secondary Image URL (bg_img2)</label>
            <input type="text" id="bg_img2" placeholder="Optional background layer">
        </div>
        <div class="input-group">
            <label>Secondary Mode</label>
            <select id="bg_mode2">
                <option value="cover">Cover</option>
                <option value="center">Center</option>
                <option value="tile">Tile</option>
            </select>
        </div>
    </div>

    <div class="section">
        <h2>Clock Face</h2>
        <div class="input-group">
            <label>Glass Tint (bg)</label>
            <input type="text" id="bg" placeholder="#000000" value="#000000">
        </div>
        <div class="input-group">
            <label>Date & Day</label>
            <select id="date">
                <option value="hide">Hide</option>
                <option value="show">Show</option>
            </select>
        </div>
        <div class="input-group full-width">
            <label>Internal Clock Image (clock_bg_img)</label>
            <input type="text" id="clock_bg_img" placeholder="https://...">
        </div>
        <div class="input-group">
            <label>Blur Intensity</label>
            <input type="number" id="blur" value="15">
        </div>
        <div class="input-group">
            <label>Internal Mode</label>
            <select id="clock_bg_mode">
                <option value="cover">Cover</option>
                <option value="center">Center</option>
                <option value="tile">Tile</option>
            </select>
        </div>
    </div>

    <div class="section">
        <h2>System</h2>
        <div class="input-group">
            <label>Auto-Reload (Hours)</label>
            <input type="number" id="reload_h" value="12">
        </div>
        <div class="input-group checkbox-group">
            <input type="checkbox" id="is_test">
            <label for="is_test" style="margin-bottom:0; cursor:pointer;">Use Test Version (test.html)</label>
        </div>
    </div>

    <div class="btn-container">
        <button id="go" onclick="launch()">DISPLAY MY WATCH</button>
    </div>
</div>

<script>
    const materialColors = ["#F44336", "#E91E63", "#9C27B0", "#673AB7", "#3F51B5", "#2196F3", "#03A9F4", "#00BCD4", "#009688", "#4CAF50", "#FFC107", "#FF9800"];

    const presets = [
        { name: "Multi-Random", desc: "2 random pics, date on, 1hr reload", vals: { bg_img: 'https://picsum.photos/1920/1080?random=1', bg_mode: 'cover', bg_img2: 'https://picsum.photos/1920/1080?random=2', bg_mode2: 'cover', date: 'show', reload_h: '1' } },
        { name: "Pexels & Linen", desc: "Nature + Texture blend, 2hr reload", vals: { bg_img: 'https://images.pexels.com/photos/11177799/pexels-photo-11177799.jpeg', bg_mode: 'cover', bg_img2: 'https://cdn.osxdaily.com/wp-content/uploads/2011/10/NSTexturedFullScreenBackgroundColor.png', bg_mode2: 'tile', date: 'show', reload_h: '2' } },
        { name: "ImageIpsum", desc: "Clean random imagery, date on", vals: { bg_img: 'http://imageipsum.com/1920/1080', bg_mode: 'cover', date: 'show', reload_h: '1' } },
        { name: "Gif Clock", desc: "Multi-bg with animated clock face", vals: { bg_img: 'https://picsum.photos/1920/1080?random=1', bg_mode: 'cover', bg_img2: 'https://picsum.photos/1920/1080?random=2', bg_mode2: 'cover', date: 'hide', reload_h: '1', clock_bg_img: 'https://gifroz.vercel.app', blur: '2', clock_bg_mode: 'cover' } },
        { name: "Mac OS Default", desc: "Pexels Landscape, cover mode", vals: { bg_img: 'https://images.pexels.com/photos/11177799/pexels-photo-11177799.jpeg', bg_mode: 'cover', date: 'show' } },
        { name: "iPad iOS 13", desc: "Classic iPad wallpaper, centered", vals: { bg_img: 'https://wallpapers.ispazio.net/wp-content/uploads/2021/06/ispazio-13.jpg', bg_mode: 'center', date: 'show' } },
        { name: "Sequoia", desc: "Modern Mac OS Light, cover", vals: { bg_img: 'https://wallpapers.ispazio.net/wp-content/uploads/2024/06/SequoiaLight.png', bg_mode: 'cover', date: 'show' } },
        { name: "Grey Linen", desc: "Classic Apple texture, tiled", vals: { bg_img: 'https://cdn.osxdaily.com/wp-content/uploads/2011/10/NSTexturedFullScreenBackgroundColor.png', bg_mode: 'tile', date: 'hide', blur: '1' } },
        { name: "iPhone iOS 15", desc: "Dark stock wallpaper, tiled", vals: { bg_img: 'https://wallpapers.ispazio.net/wp-content/uploads/2021/06/ios-15-stock-wallapper-from-ispazio-dark.png', bg_mode: 'tile', date: 'show' } }
    ];

    const grid = document.getElementById('presetGrid');

    presets.forEach((p, index) => {
        const item = document.createElement('div');
        item.className = 'preset-item';
        const iconColor = materialColors[index % materialColors.length];
        item.onclick = () => applyPreset(index, item);
        item.innerHTML = `
            <div class="preset-icon" style="background-color: ${iconColor};">${index + 1}</div>
            <div style="font-weight:600; font-size:0.9rem; margin-bottom:4px;">${p.name}</div>
            <div class="preset-desc">${p.desc}</div>
        `;
        grid.appendChild(item);
    });

    function applyPreset(index, element) {
        document.querySelectorAll('input:not([type="checkbox"])').forEach(i => i.value = "");
        document.querySelectorAll('select').forEach(s => s.selectedIndex = 0);
        document.getElementById('blur').value = "15";
        document.getElementById('reload_h').value = "12";
        document.getElementById('bg').value = "#000000";

        const data = presets[index].vals;
        for (let key in data) {
            const el = document.getElementById(key);
            if (el) el.value = data[key];
        }

        document.querySelectorAll('.preset-item').forEach(i => i.classList.remove('active'));
        element.classList.add('active');
        
        const color = materialColors[index % materialColors.length];
        document.getElementById('go').style.backgroundColor = color;
        document.getElementById('go').style.boxShadow = `0 10px 20px ${color}44`;
    }

    function launch() {
        const params = new URLSearchParams();
        const fields = ['bg_img', 'bg_mode', 'bg_img2', 'bg_mode2', 'bg', 'date', 'reload_h', 'clock_bg_img', 'clock_bg_mode', 'blur'];
        
        fields.forEach(f => {
            const val = document.getElementById(f).value;
            if (val) params.append(f, val);
        });

        // Toggle logic based on checkbox
        const isTest = document.getElementById('is_test').checked;
        const targetPage = isTest ? 'test.html' : '10th-clockblur.html';

        window.location.href = `${targetPage}?${params.toString()}`;
    }
// Register Service Worker
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('Service Worker Registered'))
            .catch(err => console.log('Service Worker Failed', err));
    });
}
</script>

</body>
</html>
